<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #c8c8c8;
    background: -webkit-gradient(linear, left top, left bottom,
                  from(#d0d0d0), to(#b8b8b8));
    font-family: 'Lucida Grande', 'Helvetica Neue', sans-serif;
    font-size: 13px;
    padding: 10px 10px 6px 10px;
    min-height: 100%;
  }

  #messages { }

  .row {
    display: -webkit-box;
    margin: 5px 0;
    -webkit-box-align: end;
  }
  .row.user      { -webkit-box-pack: end; }
  .row.assistant { -webkit-box-pack: start; }

  .bubble {
    max-width: 72%;
    padding: 7px 12px;
    border-radius: 16px;
    word-wrap: break-word;
    line-height: 1.45;
    white-space: pre-wrap;
    -webkit-user-select: text;
  }

  /* User bubble – iChat blue */
  .user .bubble {
    background: #4a90d9;
    background: -webkit-gradient(linear, left top, left bottom,
                  from(#6db3f2), to(#2d7dc9));
    color: #fff;
    text-shadow: 0 1px 0 rgba(0,0,0,0.25);
    border: 1px solid #2068b0;
    border-bottom-right-radius: 4px;
  }

  /* Claude bubble – white/silver */
  .assistant .bubble {
    background: #f4f4f4;
    background: -webkit-gradient(linear, left top, left bottom,
                  from(#ffffff), to(#e0e0e0));
    color: #222;
    border: 1px solid #b0b0b0;
    border-bottom-left-radius: 4px;
    -webkit-box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }

  .bubble img {
    max-width: 200px;
    max-height: 200px;
    border-radius: 8px;
    display: block;
  }

  /* Typing indicator */
  .typing .bubble {
    padding: 10px 16px;
  }
  .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #888;
    margin: 0 2px;
    -webkit-animation: blink 1.2s infinite;
  }
  .dot:nth-child(2) { -webkit-animation-delay: 0.2s; }
  .dot:nth-child(3) { -webkit-animation-delay: 0.4s; }
  @-webkit-keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }
</style>
</head>
<body>
<div id="messages"></div>

<script>
var typingRow = null;

function addMessage(role, text) {
    removeTyping();
    var row = document.createElement('div');
    row.className = 'row ' + role;
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.appendChild(document.createTextNode(text));
    row.appendChild(bubble);
    document.getElementById('messages').appendChild(row);
    scrollToBottom();
}

function addImageMessage(role, dataUrl) {
    removeTyping();
    var row = document.createElement('div');
    row.className = 'row ' + role;
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    var img = document.createElement('img');
    img.src = dataUrl;
    bubble.appendChild(img);
    row.appendChild(bubble);
    document.getElementById('messages').appendChild(row);
    scrollToBottom();
}

function showTyping() {
    removeTyping();
    typingRow = document.createElement('div');
    typingRow.className = 'row assistant typing';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    typingRow.appendChild(bubble);
    document.getElementById('messages').appendChild(typingRow);
    scrollToBottom();
}

function removeTyping() {
    if (typingRow && typingRow.parentNode) {
        typingRow.parentNode.removeChild(typingRow);
    }
    typingRow = null;
}

function clearMessages() {
    document.getElementById('messages').innerHTML = '';
    typingRow = null;
}

function scrollToBottom() {
    window.scrollTo(0, document.body.scrollHeight);
}
</script>
</body>
</html>
